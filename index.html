<style>
:root {
  --bg-deep: #05080e;
  --bg-primary: #0a0f1a;
  --bg-surface: #0e1525;
  --bg-card: #111b2e;
  --bg-card-hover: #162240;
  --border: #1a2744;
  --border-glow: #00e5ff33;
  --text-primary: #e4eaf5;
  --text-secondary: #7b8fad;
  --text-muted: #4a5b78;
  --accent-cyan: #00e5ff;
  --accent-cyan-dim: #00e5ff15;
  --accent-cyan-mid: #00e5ff40;
  --accent-green: #00ff9d;
  --accent-green-dim: #00ff9d15;
  --accent-orange: #ff6b35;
  --accent-orange-dim: #ff6b3515;
  --accent-purple: #a855f7;
  --circuit-color: #00e5ff12;
  --glow-cyan: 0 0 30px #00e5ff22, 0 0 60px #00e5ff11;
  --glow-green: 0 0 30px #00ff9d22, 0 0 60px #00ff9d11;
  --font-display: 'Syne', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--accent-cyan) var(--bg-deep); }
body { background: var(--bg-deep); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
::selection { background: var(--accent-cyan); color: var(--bg-deep); }
a { color: var(--accent-cyan); text-decoration: none; transition: all 0.3s; }
a:hover { color: var(--accent-green); }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, var(--circuit-color) 1px, transparent 1px) 0 0 / 80px 80px, linear-gradient(var(--circuit-color) 1px, transparent 1px) 0 0 / 80px 80px; pointer-events: none; z-index: 0; }
body::after { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 50%, #00e5ff06 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, #a855f706 0%, transparent 60%), radial-gradient(ellipse at 50% 80%, #00ff9d04 0%, transparent 60%); pointer-events: none; z-index: 0; }
</style>
